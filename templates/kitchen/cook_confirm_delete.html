{% extends "base.html" %}

{% block content %}
  <div class="card" style="max-width: 600px; border-top: 4px solid var(--danger);">
    <h2 class="card-title" style="color: var(--danger);">Confirm Deletion</h2>

    <p style="margin-bottom: 20px; font-size: 1.1rem;">
      Are you sure you want to delete the cook: <strong style="color: var(--dark-blue);">{{ object.username }}</strong>?
    </p>

    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Yes, delete it</button>
      <a href="{% url 'kitchen:cook-list' %}" class="btn btn-outline" style="margin-left: 10px;">Cancel</a>
    </form>
  </div>
{% endblock %}

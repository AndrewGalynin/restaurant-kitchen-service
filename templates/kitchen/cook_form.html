{% extends "base.html" %}

{% block content %}
  <div class="card" style="max-width: 600px;">
    <h2 class="card-title">{% if object %}Update Cook Experience{% else %}Register New Cook{% endif %}</h2>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}

      <div style="margin-top: 20px;">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'kitchen:cook-list' %}" class="btn btn-outline" style="margin-left: 10px;">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}

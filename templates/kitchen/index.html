{% extends "base.html" %}

{% block content %}
  <h1 style="color: var(--dark-blue); margin-bottom: 10px;">Welcome back!</h1>
  <p style="color: var(--text-light); margin-bottom: 30px;">Here is the current overview of our kitchen operations.</p>

  <div class="card">
    <h2 class="card-title">Kitchen Statistics</h2>
    <div class="stats-grid">
      <div class="stat-box">
        <h3>Total Dishes</h3>
        <div class="number">{{ num_dishes }}</div>
      </div>
      <div class="stat-box">
        <h3>Our Cooks</h3>
        <div class="number">{{ num_cooks }}</div>
      </div>
      <div class="stat-box">
        <h3>Dish Categories</h3>
        <div class="number">{{ num_dish_types }}</div>
      </div>
    </div>
  </div>
{% endblock %}

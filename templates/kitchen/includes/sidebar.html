<ul class="nav flex-column">
  {% if user.is_authenticated %}
    <li class="nav-item">
      <a class="nav-link text-info">Hello, {{ user.username }}!</a>
    </li>
    <li class="nav-item">
      <a class="nav-link active" href="{% url 'kitchen:index' %}">Home</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" href="#">Dishes</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" href="#">Cooks</a>
    </li>
    <li class="nav-item mt-3">
      <form action="{% url 'logout' %}" method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger btn-sm btn-block">Logout</button>
      </form>
    </li>
  {% else %}
    <li class="nav-item">
      <a class="btn btn-primary btn-block" href="{% url 'login' %}">Login</a>
    </li>
  {% endif %}
</ul>
